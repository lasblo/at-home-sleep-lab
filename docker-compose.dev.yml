services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - VIDEOS_DIR=/data/videos
      - OUTPUT_DIR=/data/output
      - DATA_DIR=/data
    volumes:
      - ./backend:/app
      - videos:/data/videos
      - output:/data/output
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:8000
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5174"
    depends_on:
      - backend

volumes:
  videos:
  output:
  dashboard_node_modules:
