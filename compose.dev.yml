services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sleeplab
      POSTGRES_USER: sleeplab
      POSTGRES_PASSWORD: sleeplab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U sleeplab
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sleeplab:sleeplab@db:5432/sleeplab
      - VIDEOS_DIR=/data/videos
      - HR_INPUT_DIR=/data/hr_input
    volumes:
      - ./backend:/app
      - videos:/data/videos
      - ./hr_input:/data/hr_input
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:8000
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5174"
    depends_on:
      - backend

volumes:
  videos:
  pgdata:
  dashboard_node_modules:
