services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sleeplab
      POSTGRES_USER: sleeplab
      POSTGRES_PASSWORD: sleeplab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U sleeplab
      interval: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://sleeplab:sleeplab@db:5432/sleeplab
      - VIDEOS_DIR=/data/videos
      - HR_INPUT_DIR=/data/hr_input
    volumes:
      - videos:/data/videos
      - ./hr_input:/data/hr_input
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  videos:
  pgdata:
